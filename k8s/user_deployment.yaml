apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service-deployment
  labels:
    app: user-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
    spec:
      containers:
        - name: user-service
          image: user-service:v4
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          env:  # ← YEH ADD KARNA HAI
            - name: DATABASE_URL
              value: "postgresql://manif_user:12345678@postgres-service:5432/manif_db"
            - name: GREETING_SERVICE_URL
              value: "http://greeting-service:80"
            - name: API_SECRET_KEY
              value: "manif_super_secret_key_12345"
            - name: DEBUG_MODE
              value: "true"
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "250m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: user-service
spec:
  selector:
    app: user-service
  ports:
  - port: 80
    targetPort: 8000
  type: NodePort